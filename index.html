<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manti Space</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='black'/><text x='50%' y='55%' font-size='12' font-family='monospace' font-weight='bold' text-anchor='middle' fill='white' dominant-baseline='middle'>M</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Press Start 2P', monospace; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
    </style>
</head>
<body>
    <canvas id="s"></canvas>

    <script>
    (function() {
        var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCOEo_Hwq34yzWBbS801jxHctcX6vk9KOM09zdSANjjEIjwx-AvwjDjx_XyF4znvaXodA7cBqWRRdS/pub?gid=0&single=true&output=csv';
        var POST_URL = 'https://script.google.com/macros/s/AKfycby-gRHhf0tdoBuY77vDI6K2wc3vorLJvyGZlCfBtjZXCrAUxKui-9bafQ6wqpyJcqtc/exec';

        var visitorName = 'Гость';
        var visitorNick = 'Гость';
        var visitorPhoto = null;
        var visitorId = 'guest_' + Math.random().toString(36).slice(2, 10);

        try {
            var tg = window.Telegram.WebApp;
            if (tg) {
                tg.expand();
                var u = tg.initDataUnsafe.user;
                if (u) {
                    visitorId = 'tg_' + u.id;
                    visitorName = u.first_name || 'Гость';
                    visitorNick = u.username ? '@' + u.username : visitorName;
                    visitorPhoto = u.photo_url || null;
                }
            }
        } catch(e) {}

        var canvas = document.getElementById('s');
        var ctx = canvas.getContext('2d');
        var width = window.innerWidth;
        var height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        var stars = [];
        var visitors = [];

        for (var i = 0; i < 350; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2.5,
                opacity: Math.random(),
                speed: Math.random() * 0.008,
                offset: Math.random() * 100
            });
        }

        function createVisitor(data) {
            var img = null;
            if (data.photo) {
                img = new Image();
                img.src = data.photo;
            }
            return {
                id: data.id, name: data.name, nick: data.nick,
                photo: data.photo, img: img, isMe: data.id === visitorId,
                x: parseFloat(data.x) || Math.random() * (width - 100) + 50,
                y: parseFloat(data.y) || Math.random() * (height - 200) + 100,
                sx: (Math.random() - 0.5) * 0.5,
                sy: (Math.random() - 0.5) * 0.4,
                size: data.id === visitorId ? 50 : 22 + Math.random() * 22,
                lastSeen: parseInt(data.lastSeen) || Date.now(),
                pulse: Math.random() * 6.28
            };
        }

        function drawVisitor(v) {
            v.x += v.sx;
            v.y += v.sy;
            if (v.x < v.size + 10 || v.x > width - v.size - 10) v.sx *= -1;
            if (v.y < v.size + 10 || v.y > height - v.size - 50) v.sy *= -1;

            var pulse = 1 + Math.sin(Date.now() * 0.003 + v.pulse) * 0.06;
            var r = v.size * pulse;

            ctx.strokeStyle = v.isMe ? 'rgba(68,170,255,0.25)' : 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(v.x, v.y, r + 10, 0, Math.PI * 2);
            ctx.stroke();

            ctx.strokeStyle = v.isMe ? 'rgba(68,170,255,0.15)' : 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.ellipse(v.x, v.y, r + 16, r * 0.2, 0.4, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.arc(v.x + 3, v.y + 3, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            ctx.beginPath();
            ctx.arc(v.x, v.y, r, 0, Math.PI * 2);
            ctx.clip();

            if (v.img && v.img.complete && v.img.naturalWidth > 0) {
                ctx.drawImage(v.img, v.x - r, v.y - r, r * 2, r * 2);
            } else {
                var grad = ctx.createRadialGradient(v.x - r*0.3, v.y - r*0.3, r*0.1, v.x, v.y, r);
                if (v.isMe) {
                    grad.addColorStop(0,'#fff');
                    grad.addColorStop(0.4,'#6ab0ff');
                    grad.addColorStop(1,'#0d2b4a');
                } else {
                    grad.addColorStop(0,'#ddd');
                    grad.addColorStop(0.5,'#888');
                    grad.addColorStop(1,'#333');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(v.x - r, v.y - r, r*2, r*2);
                ctx.fillStyle = '#fff';
                ctx.font = (r*0.7) + 'px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(v.name.charAt(0).toUpperCase(), v.x, v.y);
            }
            ctx.restore();

            if (v.isMe) {
                var glow = ctx.createRadialGradient(v.x, v.y, r*0.8, v.x, v.y, r*2);
                glow.addColorStop(0,'rgba(68,170,255,0.3)');
                glow.addColorStop(1,'rgba(68,170,255,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(v.x, v.y, r*2, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.fillStyle = v.isMe ? '#fff' : 'rgba(200,200,200,0.8)';
            ctx.font = (v.isMe ? 10 : 7) + 'px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText(v.nick, v.x, v.y + r + 16);

            var timeAgo = getTimeAgo(v.lastSeen);
            ctx.fillStyle = 'rgba(150,150,150,0.5)';
            ctx.font = '6px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText(timeAgo, v.x, v.y + r + 28);
        }

        function getTimeAgo(ts) {
            var s = Math.floor((Date.now() - ts) / 1000);
            if (s < 10) return 'сейчас';
            if (s < 60) return s + 'с';
            if (s < 3600) return Math.floor(s/60) + 'м';
            if (s < 86400) return Math.floor(s/3600) + 'ч';
            return Math.floor(s/86400) + 'д';
        }

        function loadVisitors() {
            fetch(CSV_URL)
                .then(function(r) { return r.text(); })
                .then(function(csv) {
                    var lines = csv.trim().split('\n');
                    var all = [];
                    for (var i = 1; i < lines.length; i++) {
                        var parts = lines[i].split(',');
                        if (parts.length >= 7) {
                            all.push({
                                id: parts[0],
                                name: parts[1],
                                nick: parts[2],
                                photo: parts[3],
                                x: parts[4],
                                y: parts[5],
                                lastSeen: parseInt(parts[6])
                            });
                        }
                    }
                    var now = Date.now();
                    var alive = all.filter(function(v) { return now - v.lastSeen < 300000; });
                    var oldPos = {};
                    visitors.forEach(function(v) { oldPos[v.id] = { x:v.x, y:v.y, sx:v.sx, sy:v.sy }; });
                    visitors = [];
                    alive.forEach(function(v) {
                        var pos = oldPos[v.id];
                        if (pos) { v.x = pos.x; v.y = pos.y; }
                        visitors.push(createVisitor(v));
                    });
                    if (!visitors.find(function(v) { return v.id === visitorId; })) {
                        visitors.push(createVisitor({
                            id: visitorId, name: visitorName,
                            nick: visitorNick, photo: visitorPhoto,
                            lastSeen: Date.now()
                        }));
                    }
                })
                .catch(function() {});
        }

        function updateMe() {
            var me = visitors.find(function(v) { return v.id === visitorId; });
            if (!me) return;

            var data = {
                id: visitorId,
                name: visitorName,
                nick: visitorNick,
                photo: visitorPhoto || '',
                x: me.x,
                y: me.y,
                lastSeen: Date.now()
            };

            fetch(POST_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(function() {});
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, width, height);

            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                var o = s.opacity * (0.4 + 0.6 * Math.sin(Date.now() * s.speed + s.offset));
                ctx.fillStyle = 'rgba(255,255,255,' + o + ')';
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }

            var t1 = ctx.createRadialGradient(width*0.7, height*0.3, 0, width*0.7, height*0.3, 250);
            t1.addColorStop(0,'rgba(30,30,80,0.04)');
            t1.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle = t1;
            ctx.fillRect(0, 0, width, height);

            var t2 = ctx.createRadialGradient(width*0.2, height*0.7, 0, width*0.2, height*0.7, 200);
            t2.addColorStop(0,'rgba(60,15,30,0.04)');
            t2.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle = t2;
            ctx.fillRect(0, 0, width, height);

            for (var i = 0; i < visitors.length; i++) {
                drawVisitor(visitors[i]);
            }

            requestAnimationFrame(draw);
        }

        loadVisitors();
        setInterval(loadVisitors, 5000);
        setInterval(updateMe, 3000);

        window.addEventListener('resize', function() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        draw();
    })();
    </script>
</body>
</html>
