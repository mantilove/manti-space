<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manti Space</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='black'/><text x='50%' y='55%' font-size='12' font-family='monospace' font-weight='bold' text-anchor='middle' fill='white' dominant-baseline='middle'>M</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }
        canvas { 
            display: block;
            position: fixed; 
            top: 0; 
            left: 0; 
        }
        p {
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            color: #fff; 
            font-size: 10px; 
            font-family: monospace;
            z-index: 2; 
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="s"></canvas>
    <p id="counter">🚀 MANTI SPACE</p>

    <script>
    (function() {
        var canvas = document.getElementById('s');
        var ctx = canvas.getContext('2d');
        var width = window.innerWidth;
        var height = window.innerHeight;
        
        canvas.width = width;
        canvas.height = height;
        
        var stars = [];
        var meteors = [];
        var rocket = {
            x: width / 2,
            y: height * 0.8,
            targetY: height * 0.1,
            arrived: false,
            trail: [],
            wobble: 0
        };

        for (var i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2,
                opacity: Math.random(),
                speed: Math.random() * 0.01,
                offset: Math.random() * 100
            });
        }

        for (var i = 0; i < 5; i++) {
            meteors.push({
                x: Math.random() * width,
                y: Math.random() * height,
                speed: 3 + Math.random() * 5,
                angle: (Math.random() - 0.5) * 0.3,
                length: 10 + Math.random() * 20
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, width, height);

            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                var opacity = s.opacity * (0.5 + 0.5 * Math.sin(Date.now() * s.speed + s.offset));
                ctx.fillStyle = 'rgba(255, 255, 255, ' + opacity + ')';
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }

            for (var i = 0; i < meteors.length; i++) {
                var m = meteors[i];
                m.y += m.speed;
                m.x += m.angle;
                
                if (m.y > height + 20 || m.x < -20 || m.x > width + 20) {
                    m.y = -10;
                    m.x = Math.random() * width;
                }
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x - m.angle * m.length, m.y - m.length);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.fillRect(m.x, m.y, 2, 2);
            }

            if (!rocket.arrived && rocket.y > rocket.targetY) {
                rocket.y -= 0.7;
                rocket.wobble += 0.1;
                rocket.trail.push({
                    x: rocket.x + Math.sin(rocket.wobble) * 3 + (Math.random() - 0.5) * 6,
                    y: rocket.y + 14,
                    opacity: 0.9
                });
            } else {
                rocket.arrived = true;
                rocket.y += Math.sin(Date.now() * 0.0008) * 0.4;
                rocket.x += Math.cos(Date.now() * 0.0006) * 0.3;
            }

            for (var i = 0; i < rocket.trail.length; i++) {
                rocket.trail[i].opacity -= 0.012;
                rocket.trail[i].y += 0.4;
            }
            rocket.trail = rocket.trail.filter(function(t) { return t.opacity > 0; });

            for (var i = 0; i < rocket.trail.length; i++) {
                ctx.fillStyle = 'rgba(255, 200, 50, ' + rocket.trail[i].opacity + ')';
                ctx.fillRect(rocket.trail[i].x - 2, rocket.trail[i].y - 2, 4, 4);
            }

            if (!rocket.arrived) {
                ctx.fillStyle = '#ff6b35';
                ctx.beginPath();
                ctx.moveTo(rocket.x - 5, rocket.y + 10);
                ctx.lineTo(rocket.x, rocket.y + 22);
                ctx.lineTo(rocket.x + 5, rocket.y + 10);
                ctx.fill();
            }

            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(rocket.x - 5, rocket.y - 8, 10, 20);

            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.moveTo(rocket.x - 5, rocket.y - 8);
            ctx.lineTo(rocket.x, rocket.y - 16);
            ctx.lineTo(rocket.x + 5, rocket.y - 8);
            ctx.fill();

            ctx.fillStyle = '#4af';
            ctx.fillRect(rocket.x - 2, rocket.y, 4, 4);

            ctx.fillStyle = '#888';
            ctx.fillRect(rocket.x - 9, rocket.y + 6, 4, 6);
            ctx.fillRect(rocket.x + 5, rocket.y + 6, 4, 6);

            ctx.fillStyle = '#fff';
            ctx.font = '3px monospace';
            ctx.fillText('MANTI', rocket.x - 12, rocket.y - 12);

            requestAnimationFrame(draw);
        }

        draw();

        setInterval(function() {
            meteors.push({
                x: Math.random() * width,
                y: -10,
                speed: 3 + Math.random() * 5,
                angle: (Math.random() - 0.5) * 0.3,
                length: 10 + Math.random() * 20
            });
            if (meteors.length > 8) meteors.shift();
        }, 3000);

        window.addEventListener('resize', function() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });
    })();
    </script>
</body>
</html>
